name: remesas

services:
  backend:
    build:
      context: ./backend
    environment:
      - PORT=3001
      - TRONDEALER_API_KEY=${TRONDEALER_API_KEY:-}
      - TRONDEALER_WEBHOOK_SECRET=${TRONDEALER_WEBHOOK_SECRET:-}
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 256

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.50
    pids_limit: 100
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
